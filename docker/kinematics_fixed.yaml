# De-wrapped SR5 kinematics for MoveItConfigsBuilder.
#
# The vendor config/kinematics.yaml wraps this in `/**: ros__parameters:`, which
# MoveItConfigsBuilder(...).robot_description_kinematics(file_path=...) does NOT
# strip on Humble/MoveIt 2.5.9 — so the KDL solver never initialises for the
# 'rokae_arm' group and every /compute_ik returns NO_IK_SOLUTION. This is the
# same content with the wrapper removed.
rokae_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005
