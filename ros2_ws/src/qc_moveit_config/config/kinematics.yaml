# IK solver config for the QC cell.
#
# NOTE the structure: MoveItConfigsBuilder.robot_description_kinematics() expects
# the BARE group mapping (rokae_arm: ...), NOT the "/**: ros__parameters:" wrapper
# the vendor file uses. With the wrapper the params never bind and move_group logs
# "No kinematics plugins defined" -> IK returns NO_IK_SOLUTION for everything.
# That -- not KDL, not the overhead mount -- was why cartesian planning gave 0.0.
#
# Also bumped the timeout: the vendor's 0.005 s (5 ms) is too tight for KDL.
rokae_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
